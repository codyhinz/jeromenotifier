name: YouTube & Twitch Notifier

on:
  schedule:
    - cron: "*/20 * * * *"  # Runs every 20 minutes
  workflow_dispatch:          # Allows manual trigger from GitHub UI

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # Needed to commit state.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run notifier
        env:
          DISCORD_WEBHOOK:  ${{ secrets.DISCORD_WEBHOOK }}
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_SECRET:    ${{ secrets.TWITCH_SECRET }}
        run: python notify.py

      - name: Save state back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Update Twitch state"
          git push
